<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All of Us — Capacity Planning</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#eef0f3;color:#1a1a1a;overflow:hidden;}
button,select,input{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* Table */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:#1e2a3a;color:#c8d4e0;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;padding:7px 10px;white-space:nowrap;position:sticky;top:0;z-index:5;border-right:1px solid #2d3e52;cursor:pointer;user-select:none;}
.tbl th:hover{background:#263547;color:#fff;}
.tbl th:last-child{border-right:none;}
.tbl td{padding:6px 10px;border-bottom:1px solid #e8eaed;border-right:1px solid #f0f0f0;vertical-align:middle;white-space:nowrap;}
.tbl td:last-child{border-right:none;}
.tbl tr:hover td{background:#f4f7fb !important;}
.tbl tr:nth-child(even) td{background:#fafbfc;}
.tbl tr:nth-child(odd) td{background:#fff;}

/* Sort indicator */
.sort-asc::after{content:" ↑";opacity:.7;}
.sort-desc::after{content:" ↓";opacity:.7;}

/* Chips */
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap;}
.ci-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:12px;white-space:nowrap;}
.filter-btn{font-size:11px;padding:4px 10px;border:1px solid #ddd;border-radius:14px;background:#fff;cursor:pointer;color:#555;transition:all .12s;}
.filter-btn:hover,.filter-btn.active{background:#1e2a3a;border-color:#1e2a3a;color:#fff;}
.sort-sel{font-size:11px;padding:4px 8px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#555;cursor:pointer;}
</style>
</head>
<body>
<div id="root" style="height:100%;display:flex;flex-direction:column;"></div>
<script type="text/babel">

const LIVE_CSV     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3uNKjiErriTzB7r258GdfQdeXVhzjbfG4VZr5J0u9ZMj9punGsNHbnzeaGyuiC3-VT1cUHAqrOSXI/pub?gid=0&single=true&output=csv";
const GOALS_CSV    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3uNKjiErriTzB7r258GdfQdeXVhzjbfG4VZr5J0u9ZMj9punGsNHbnzeaGyuiC3-VT1cUHAqrOSXI/pub?gid=1157686184&single=true&output=csv";
const CAPACITY_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBMoz4Ih_0AkKsm0qr1xfM4tkppaQqFJVWJ8IE6tmSO99MmxUOW8scahb2ljMapz_lPO_4Q_EaKDR8/pub?gid=910516878&single=true&output=csv";

const GOALS = {
  "1":{num:"1",name:"Enrollment & Retention",short:"Enrollment",color:"#2471A3"},
  "2":{num:"2",name:"Data to Researchers",short:"Data",color:"#1E8449"},
  "3":{num:"3",name:"Partnered Research",short:"Partnered Rsch",color:"#D35400"},
  "4":{num:"4",name:"Researcher Access",short:"Rsch Access",color:"#B7950B"},
  "5":{num:"5",name:"Return of Value",short:"Return of Value",color:"#7D3C98"},
  "6":{num:"6",name:"Management & Ops",short:"Mgmt & Ops",color:"#5D6D7E"},
};

const STATUS_CFG = {
  Committed:{bg:"#D6EAF8",tx:"#1F618D"},
  Proposed:{bg:"#FCF3CF",tx:"#7D6608"},
  Backlogged:{bg:"#EAECEE",tx:"#566573"},
  Complete:{bg:"#D5F5E3",tx:"#1E8449"},
};

function ciTier(n){
  if(n==null)return"none";
  if(n>=8)return"high";
  if(n>=6)return"med";
  return"risk";
}
function ciStyle(n){
  var t=ciTier(n);
  if(t==="high")return{bg:"#D5F5E3",tx:"#1a6b3a",dot:"#1E8449"};
  if(t==="med") return{bg:"#FEF9E7",tx:"#7D6008",dot:"#F1C40F"};
  if(t==="risk")return{bg:"#FDECEA",tx:"#922b21",dot:"#C0392B"};
  return{bg:"#f0f0f0",tx:"#999",dot:"#ccc"};
}

function cacheBust(u){return u+(u.includes("?")?"&":"?")+"_="+Date.now();}

function parseCSV(text){
  var rows=[],row=[],cell="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i],n=text[i+1];
    if(c==='"'&&inQ&&n==='"'){cell+='"';i++;}
    else if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){row.push(cell);cell="";}
    else if((c==='\n'||c==='\r')&&!inQ){if(cell||row.length){row.push(cell);rows.push(row);row=[];cell="";}if(c==='\r'&&n==='\n')i++;}
    else cell+=c;
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}
function nh(h){return String(h||"").toLowerCase().replace(/[\r\n]+/g," ").replace(/\s+/g," ").trim();}
function makeGet(hdr){
  var n=hdr.map(nh);
  return function(row){
    for(var k=1;k<arguments.length;k++){var idx=n.indexOf(nh(arguments[k]));if(idx!==-1&&row[idx]!=null&&String(row[idx]).trim()!=="")return String(row[idx]).trim();}
    return"";
  };
}
function findHdr(rows){
  for(var i=0;i<Math.min(5,rows.length);i++){var n=rows[i].map(nh);if(n.includes("id")&&(n.includes("initiative name")||n.includes("name")))return i;}
  return 0;
}
function parseSt(r){
  if(!r)return null;
  if(/proposed/i.test(r))return"Proposed";
  if(/committed/i.test(r))return"Committed";
  if(/backlog/i.test(r))return"Backlogged";
  if(/complete/i.test(r))return"Complete";
  return null;
}

function parseInits(t){
  var rows=parseCSV(t),hi=findHdr(rows),hdr=rows[hi],body=rows.slice(hi+1),get=makeGet(hdr);
  return body.reduce(function(acc,row){
    var id=get(row,"ID"),name=get(row,"Initiative Name","Name");
    if(!id||!name)return acc;
    var gm=String(get(row,"5 year Goal","Goal","5-year Goal")).match(/(\d)/);
    var g=gm?gm[1]:"";if(!GOALS[g])return acc;
    acc.push({id,name,goal:g,status:parseSt(get(row,"Q3 2026 Status","Q3 Status"))||parseSt(get(row,"Q2 2026 Status","Q2 Status")),
      isNew:/^new\b/i.test(get(row,"Project Type","Type")),
      objOwner:get(row,"Obj Owner","Objective Owner","Owner"),
      objName:get(row,"Objective Name","Obj Name")});
    return acc;
  },[]);
}

function parseCap(t){
  var rows=parseCSV(t),hi=0;
  for(var i=0;i<Math.min(6,rows.length);i++){if(rows[i][0]&&nh(rows[i][0])==="id"){hi=i;break;}}
  var get=makeGet(rows[hi]),body=rows.slice(hi+1),map={};
  body.forEach(function(row){
    var id=get(row,"ID");if(!id||!/^\d+\.\d+/.test(id))return;
    var cfr=get(row,"Confidence Factor");
    var cf=cfr.includes("%")?parseFloat(cfr)/100:parseFloat(cfr)||0;
    var lbl=String(row[2]||"").trim();
    var cm=lbl.match(/(\d+)/);
    function int(k){return parseInt(get(row,k))||0;}
    map[id]={cf:isNaN(cf)?0:cf,lbl,ciNum:cm?parseInt(cm[1]):null,
      performers:int("Performers"),committed:int("Committed"),
      posXS:int("Possibly - XS"),posS:int("Possibly - S"),posM:int("Possibly - M"),
      posL:int("Possibly - L"),posXL:int("Possibly - XL"),
      noCapacity:int("No Capacity Remaining"),notPerforming:int("Not Performing")};
  });
  return map;
}

function parseGoals(t){
  var rows=parseCSV(t),hi=0;
  for(var i=0;i<Math.min(5,rows.length);i++){var n=rows[i].map(nh);if(n.some(function(h){return h==="goal"||h==="goal #";})){hi=i;break;}}
  var get=makeGet(rows[hi]),body=rows.slice(hi+1),map={},lastG=null;
  body.forEach(function(row){
    var blank=row.every(function(c){return!c||!String(c).trim();});if(blank)return;
    var gm=String(get(row,"Goal","Goal #","5 year Goal")||"").match(/(\d)/);
    var gn=gm?gm[1]:lastG;if(!gn)return;lastG=gn;
    if(!map[gn])map[gn]={owner:get(row,"Goal Owner","Goal Owner Name")};
  });
  return map;
}

// Error boundary
function EBC(p){React.Component.call(this,p);this.state={err:null};}
EBC.prototype=Object.create(React.Component.prototype);
EBC.prototype.constructor=EBC;
EBC.prototype.componentDidCatch=function(e){this.setState({err:e});};
EBC.prototype.render=function(){
  if(this.state.err)return React.createElement("div",{style:{padding:40,color:"#C0392B",fontFamily:"monospace"}},String(this.state.err));
  return this.props.children;
};

const {useState,useMemo,useEffect,useRef} = React;

// Mini staffing bar
function MiniBar({cap}){
  if(!cap||!cap.performers)return <span style={{color:"#ccc",fontSize:10}}>awaiting</span>;
  var tot=cap.performers;
  var segs=[
    {n:cap.committed,c:"#1E8449"},
    {n:cap.posS,c:"#58D68D"},
    {n:cap.posM,c:"#F9E79F"},
    {n:cap.posL,c:"#F0B27A"},
    {n:cap.noCapacity,c:"#E74C3C"},
  ];
  return(
    <div style={{display:"flex",flexDirection:"column",gap:2}}>
      <div style={{display:"flex",height:6,borderRadius:2,overflow:"hidden",background:"#eee",width:80}}>
        {segs.map(function(s,i){return s.n>0?<div key={i} style={{flexGrow:s.n,background:s.c}}/>:null;})}
      </div>
    </div>
  );
}

// Staffing counts inline
function StaffCounts({cap}){
  if(!cap||!cap.performers)return <span style={{color:"#bbb",fontSize:10}}>—</span>;
  var pos=cap.posXS+cap.posS+cap.posM+cap.posL+cap.posXL;
  return(
    <span style={{display:"inline-flex",gap:6,fontSize:11,fontWeight:600}}>
      {cap.committed>0&&<span style={{color:"#1E8449"}}>✓{cap.committed}</span>}
      {pos>0&&<span style={{color:"#B7950B"}}>~{pos}</span>}
      {cap.noCapacity>0&&<span style={{color:"#C0392B"}}>✗{cap.noCapacity}</span>}
    </span>
  );
}

// Drill panel
function DrillPanel({item,onClose}){
  var {init,cap}=item;
  var g=GOALS[init.goal];
  var cs=ciStyle(cap?cap.ciNum:null);
  var pos=cap?(cap.posXS+cap.posS+cap.posM+cap.posL+cap.posXL):0;
  return(
    <div style={{position:"fixed",inset:0,zIndex:900,display:"flex",justifyContent:"flex-end"}}>
      <div onClick={onClose} style={{flex:1,background:"rgba(0,0,0,.25)"}}/>
      <div style={{width:440,background:"#fff",borderLeft:"1px solid #ddd",boxShadow:"-4px 0 20px rgba(0,0,0,.12)",display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Header */}
        <div style={{padding:"14px 18px",borderBottom:"1px solid #ececec",background:"#1e2a3a",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:10,color:"#7a9ab8",fontFamily:"monospace",marginBottom:4}}>{init.id} · {g?("G"+g.num+" "+g.name):""}</div>
              <div style={{fontSize:14,fontWeight:700,color:"#fff",lineHeight:1.3}}>{init.name}</div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"none",color:"#aaa",fontSize:20,cursor:"pointer",padding:0}}>×</button>
          </div>
          <div style={{display:"flex",gap:4,marginTop:10,flexWrap:"wrap"}}>
            {init.status&&<span className="chip" style={{background:STATUS_CFG[init.status]?STATUS_CFG[init.status].bg:"#eee",color:STATUS_CFG[init.status]?STATUS_CFG[init.status].tx:"#666"}}>{init.status}</span>}
            {init.isNew&&<span className="chip" style={{background:"#FEF5E7",color:"#9A6800"}}>NEW</span>}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:"16px 18px"}}>
          {/* CI card */}
          <div style={{padding:"14px",borderRadius:8,background:cs.bg,border:"1px solid "+cs.dot+"44",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div>
                <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:cs.tx,fontWeight:600,marginBottom:4,opacity:.7}}>{cap?cap.lbl:"Confidence Index"}</div>
                <div style={{fontSize:32,fontWeight:800,color:cs.tx,lineHeight:1}}>{cap&&cap.ciNum!=null?cap.ciNum:"—"}<span style={{fontSize:14,fontWeight:400,opacity:.5}}>/10</span></div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:24,fontWeight:700,color:cs.tx}}>{cap?Math.round(cap.cf*100):0}%</div>
                <div style={{fontSize:10,color:cs.tx,opacity:.7}}>{cap?cap.performers:0} team{cap&&cap.performers!==1?"s":""}</div>
              </div>
            </div>
            <div style={{height:8,borderRadius:4,background:cs.tx+"22",overflow:"hidden"}}>
              <div style={{height:"100%",width:(cap?Math.round(cap.cf*100):0)+"%",background:cs.dot,borderRadius:4}}/>
            </div>
          </div>

          {/* Breakdown table */}
          {cap&&cap.performers?(
            <div style={{marginBottom:14,border:"1px solid #ececec",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"8px 12px",background:"#f8f9fb",borderBottom:"1px solid #ececec",fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600}}>Staffing breakdown</div>
              {[
                {label:"Definitely committed",icon:"✓",n:cap.committed,col:"#1E8449",weight:"+1.0",note:"Full confidence"},
                {label:"Possibly — S",icon:"~",n:cap.posS,col:"#27AE60",weight:"+0.8",note:"Low risk"},
                {label:"Possibly — M",icon:"~",n:cap.posM,col:"#B7950B",weight:"0",note:"Neutral"},
                {label:"Possibly — L",icon:"~",n:cap.posL,col:"#E67E22",weight:"−0.5",note:"Risk signal"},
                {label:"Possibly — XL",icon:"~",n:cap.posXL,col:"#C0392B",weight:"−0.5",note:"Risk signal"},
                {label:"No capacity",icon:"✗",n:cap.noCapacity,col:"#C0392B",weight:"−1.0",note:"Strongest risk"},
              ].filter(function(r){return r.n>0;}).map(function(r,i){
                return(
                  <div key={i} style={{display:"grid",gridTemplateColumns:"20px 1fr auto auto",gap:8,padding:"7px 12px",borderBottom:"1px solid #f5f5f5",alignItems:"center",fontSize:11.5}}>
                    <span style={{color:r.col,fontWeight:700}}>{r.icon}</span>
                    <span style={{color:"#333"}}>{r.label}</span>
                    <span style={{color:"#aaa",fontSize:10}}>{r.weight}</span>
                    <span style={{fontWeight:700,color:r.col,minWidth:16,textAlign:"right"}}>{r.n}</span>
                  </div>
                );
              })}
              {cap.notPerforming>0&&(
                <div style={{display:"grid",gridTemplateColumns:"20px 1fr auto auto",gap:8,padding:"7px 12px",alignItems:"center",fontSize:11.5}}>
                  <span style={{color:"#ccc"}}>–</span>
                  <span style={{color:"#aaa"}}>Not performing</span>
                  <span/>
                  <span style={{color:"#aaa",minWidth:16,textAlign:"right"}}>{cap.notPerforming}</span>
                </div>
              )}
            </div>
          ):(
            <div style={{padding:"24px",textAlign:"center",color:"#bbb",fontSize:12,fontStyle:"italic",border:"1px solid #ececec",borderRadius:6,marginBottom:14}}>No capacity data submitted yet.</div>
          )}

          {/* People */}
          {(init.objOwner||init.objName)&&(
            <div style={{border:"1px solid #ececec",borderRadius:6,overflow:"hidden"}}>
              <div style={{padding:"8px 12px",background:"#f8f9fb",borderBottom:"1px solid #ececec",fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#999",fontWeight:600}}>People</div>
              <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:"6px 10px",padding:"10px 12px",fontSize:11.5}}>
                {init.objOwner&&<><span style={{color:"#aaa"}}>Obj. Owner</span><span>{init.objOwner}</span></>}
                {init.objName&&<><span style={{color:"#aaa"}}>Objective</span><span style={{fontSize:11}}>{init.objName}</span></>}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App(){
  var ist=useState([]);   var inits=ist[0],setInits=ist[1];
  var cst=useState({});   var capMap=cst[0],setCapMap=cst[1];
  var gst=useState({});   var goalsRef=gst[0],setGoalsRef=gst[1];
  var lst=useState("loading"); var loadState=lst[0],setLoadState=lst[1];
  var ler=useState("");   var loadError=ler[0],setLoadError=ler[1];
  var lat=useState(null); var loadedAt=lat[0],setLoadedAt=lat[1];
  var drl=useState(null); var drill=drl[0],setDrill=drl[1];

  // Filters
  var gfl=useState("all"); var goalFilter=gfl[0],setGoalFilter=gfl[1];
  var tfl=useState("all"); var tierFilter=tfl[0],setTierFilter=tfl[1];
  var sfl=useState("");   var search=sfl[0],setSearch=sfl[1];
  var srt=useState({col:"ci",dir:"asc"}); var sortState=srt[0],setSortState=srt[1];

  function loadAll(){
    setLoadState("loading");setLoadError("");
    var p1=fetch(cacheBust(LIVE_CSV),{cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();}).then(parseInits);
    var p2=fetch(cacheBust(CAPACITY_CSV),{cache:"no-store"}).then(function(r){return r.text();}).then(parseCap).catch(function(){return{};});
    var p3=fetch(cacheBust(GOALS_CSV),{cache:"no-store"}).then(function(r){return r.text();}).then(parseGoals).catch(function(){return{};});
    Promise.all([p1,p2,p3]).then(function(r){setInits(r[0]);setCapMap(r[1]);setGoalsRef(r[2]);setLoadState("live");setLoadedAt(new Date());})
      .catch(function(e){setLoadError(e.message||String(e));setLoadState("error");});
  }
  useEffect(function(){loadAll();},[]);

  // Join
  var items=useMemo(function(){
    return inits.map(function(i){return{init:i,cap:capMap[i.id]||null};});
  },[inits,capMap]);

  // Health
  var health=useMemo(function(){
    var h=0,m=0,r=0,nd=0,sum=0,cnt=0;
    items.forEach(function(x){
      var n=x.cap?x.cap.ciNum:null;
      if(n==null){nd++;return;}
      cnt++;sum+=n;
      if(n>=8)h++;else if(n>=6)m++;else r++;
    });
    return{high:h,med:m,risk:r,noData:nd,avg:cnt?Math.round(sum/cnt*10)/10:null,total:items.length};
  },[items]);

  // Filter + sort
  function compareIds(a,b){
    var ap=String(a).split(".").map(Number),bp=String(b).split(".").map(Number);
    for(var i=0;i<Math.max(ap.length,bp.length);i++){var av=ap[i]||0,bv=bp[i]||0;if(av!==bv)return av-bv;}
    return 0;
  }

  var filtered=useMemo(function(){
    var out=items.filter(function(x){
      if(goalFilter!=="all"&&x.init.goal!==goalFilter)return false;
      if(tierFilter!=="all"){
        var t=ciTier(x.cap?x.cap.ciNum:null);
        if(tierFilter==="none"&&t!=="none")return false;
        if(tierFilter!=="none"&&t!==tierFilter)return false;
      }
      if(search){var q=search.toLowerCase();if(!x.init.name.toLowerCase().includes(q)&&!x.init.id.includes(q))return false;}
      return true;
    });
    var col=sortState.col,dir=sortState.dir,asc=dir==="asc";
    out.sort(function(a,b){
      var av,bv;
      if(col==="ci"){av=a.cap?a.cap.ciNum??-1:-1;bv=b.cap?b.cap.ciNum??-1:-1;return asc?av-bv:bv-av;}
      if(col==="id"){var c=compareIds(a.init.id,b.init.id);return asc?c:-c;}
      if(col==="goal"){av=a.init.goal;bv=b.init.goal;return asc?av.localeCompare(bv):bv.localeCompare(av);}
      if(col==="performers"){av=a.cap?a.cap.performers:0;bv=b.cap?b.cap.performers:0;return asc?av-bv:bv-av;}
      if(col==="committed"){av=a.cap?a.cap.committed:0;bv=b.cap?b.cap.committed:0;return asc?av-bv:bv-av;}
      if(col==="name")return asc?a.init.name.localeCompare(b.init.name):b.init.name.localeCompare(a.init.name);
      return 0;
    });
    return out;
  },[items,goalFilter,tierFilter,search,sortState]);

  function toggleSort(col){
    setSortState(function(p){return{col:col,dir:p.col===col&&p.dir==="asc"?"desc":"asc"};});
  }
  function thClass(col){return sortState.col===col?"sort-"+(sortState.dir==="asc"?"asc":"desc"):"";}

  // Attention items
  var atRisk=useMemo(function(){return items.filter(function(x){return x.cap&&x.cap.ciNum!=null&&x.cap.ciNum<8;}).sort(function(a,b){return(a.cap.ciNum||99)-(b.cap.ciNum||99);});;},[items]);

  var drillItem=drill?items.find(function(x){return x.init.id===drill;}):null;

  if(loadState==="loading")return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#999"}}>
      <div style={{width:32,height:32,border:"3px solid #eee",borderTopColor:"#2471A3",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:13}}>Loading capacity data…</div>
    </div>
  );
  if(loadState==="error")return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#555",padding:40}}>
      <div>⚠️ {loadError}</div>
      <button onClick={loadAll} style={{padding:"8px 20px",border:"1px solid #2471A3",color:"#2471A3",background:"#fff",borderRadius:6,cursor:"pointer"}}>Retry</button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#eef0f3"}}>

      {/* ── Header ── */}
      <div style={{background:"#1e2a3a",padding:"10px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <div>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:1.2,color:"#7a9ab8",fontWeight:600}}>NIH · <em>All of Us</em> Research Program · Q3 2026</div>
          <div style={{fontSize:17,fontWeight:700,color:"#fff",marginTop:2}}>Capacity Planning Dashboard</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:10,color:loadState==="live"?"#58d68d":"#7a9ab8"}}>
            {loadState==="live"?"● Live · "+loadedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"}):""}
          </span>
          <button onClick={loadAll} style={{fontSize:11,padding:"5px 12px",border:"1px solid #3a5068",borderRadius:5,background:"#263547",color:"#a8c4d8",cursor:"pointer"}}>↻ Refresh</button>
        </div>
      </div>

      {/* ── Health tiles ── */}
      <div style={{background:"#fff",borderBottom:"2px solid #dde1e7",padding:"10px 24px",display:"flex",gap:8,flexShrink:0,alignItems:"center",flexWrap:"wrap"}}>
        {[
          {label:"Total",val:health.total,sub:"initiatives",col:"#1e2a3a",bg:"#f7f9fc",border:"#dde1e7"},
          {label:"🟢 On Track",val:health.high,sub:"CI 8–10",col:"#1a6b3a",bg:"#eafaf1",border:"#82E0AA"},
          {label:"🟡 Monitor",val:health.med,sub:"CI 6–7",col:"#7D6008",bg:"#fefaec",border:"#F9E79F"},
          {label:"🔴 At Risk",val:health.risk,sub:"CI ≤ 5",col:"#922b21",bg:"#fdf2f2",border:"#FADBD8"},
          {label:"⚪ No Data",val:health.noData,sub:"awaiting",col:"#888",bg:"#f8f8f8",border:"#e0e0e0"},
        ].map(function(t){return(
          <div key={t.label} style={{padding:"7px 14px",background:t.bg,border:"1px solid "+t.border,borderRadius:7,minWidth:90,textAlign:"center",cursor:t.label!=="Total"&&t.label!=="Avg CI"?"pointer":"default"}}
            onClick={function(){
              if(t.label==="🟢 On Track")setTierFilter("high");
              else if(t.label==="🟡 Monitor")setTierFilter("med");
              else if(t.label==="🔴 At Risk")setTierFilter("risk");
              else if(t.label==="⚪ No Data")setTierFilter("none");
            }}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:t.col,fontWeight:600,opacity:.8}}>{t.label}</div>
            <div style={{fontSize:22,fontWeight:800,color:t.col,lineHeight:1.1,marginTop:1}}>{t.val}</div>
            <div style={{fontSize:9,color:t.col,opacity:.6,marginTop:1}}>{t.sub}</div>
          </div>
        );})}
        {health.avg!=null&&(
          <div style={{padding:"7px 14px",background:"#f4f6f8",border:"1px solid #dde1e7",borderRadius:7,minWidth:90,textAlign:"center"}}>
            <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.4,color:"#555",fontWeight:600,opacity:.8}}>Avg CI</div>
            <div style={{fontSize:22,fontWeight:800,color:health.avg>=8?"#1a6b3a":health.avg>=6?"#7D6008":"#922b21",lineHeight:1.1,marginTop:1}}>{health.avg}</div>
            <div style={{fontSize:9,color:"#888",marginTop:1}}>program avg</div>
          </div>
        )}

        {/* Attention callout */}
        {atRisk.length>0&&(
          <div style={{marginLeft:"auto",padding:"8px 14px",background:"#fdf2f2",border:"1px solid #FADBD8",borderRadius:7,maxWidth:360}}>
            <div style={{fontSize:10,fontWeight:700,color:"#922b21",marginBottom:5}}>⚠ {atRisk.length} initiative{atRisk.length!==1?"s":""} need discussion before QPE</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {atRisk.slice(0,5).map(function(x){
                var cs=ciStyle(x.cap.ciNum);
                return(
                  <span key={x.init.id} onClick={function(){setDrill(x.init.id);}} style={{fontSize:9.5,padding:"2px 7px",borderRadius:8,background:cs.bg,color:cs.tx,border:"1px solid "+cs.dot+"55",cursor:"pointer",fontWeight:600}}>
                    {x.init.id} · CI {x.cap.ciNum}
                  </span>
                );
              })}
              {atRisk.length>5&&<span style={{fontSize:9.5,color:"#922b21",alignSelf:"center"}}>+{atRisk.length-5} more</span>}
            </div>
          </div>
        )}
      </div>

      {/* ── Filter / sort bar ── */}
      <div style={{background:"#f4f6f8",borderBottom:"1px solid #dde1e7",padding:"8px 24px",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:9.5,fontWeight:700,textTransform:"uppercase",letterSpacing:.5,color:"#888"}}>Filter</span>

        {/* Tier filter */}
        {[{k:"all",l:"All"},{k:"risk",l:"🔴 At Risk"},{k:"med",l:"🟡 Monitor"},{k:"high",l:"🟢 On Track"},{k:"none",l:"⚪ No Data"}].map(function(f){
          return <button key={f.k} className={"filter-btn"+(tierFilter===f.k?" active":"")} onClick={function(){setTierFilter(f.k);}}>{f.l}</button>;
        })}

        <div style={{width:1,height:18,background:"#ddd",margin:"0 4px"}}/>

        {/* Goal filter */}
        <select value={goalFilter} onChange={function(e){setGoalFilter(e.target.value);}} className="sort-sel">
          <option value="all">All Goals</option>
          {Object.keys(GOALS).map(function(k){return<option key={k} value={k}>G{GOALS[k].num}: {GOALS[k].short}</option>;})}
        </select>

        <div style={{flex:1}}/>

        {/* Search */}
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="🔍  Search initiative…"
          style={{fontSize:11.5,padding:"5px 10px",border:"1px solid #ddd",borderRadius:14,width:200,background:"#fff"}}/>

        {search||goalFilter!=="all"||tierFilter!=="all"?
          <button onClick={function(){setSearch("");setGoalFilter("all");setTierFilter("all");}}
            style={{fontSize:11,background:"none",border:"none",color:"#C0392B",cursor:"pointer",fontWeight:600}}>✕ Clear</button>:null}

        <span style={{fontSize:10.5,color:"#999",marginLeft:4}}>
          {filtered.length} of {health.total}
        </span>
      </div>

      {/* ── Table ── */}
      <div style={{flex:1,overflow:"auto",padding:"12px 24px 16px",background:"#eef0f3"}}>
        <div style={{border:"1.5px solid #cdd2da",borderRadius:8,overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,.06)"}}>
          <table className="tbl">
            <thead>
              <tr>
                <th style={{width:4,padding:0,cursor:"default"}}></th>
                <th className={thClass("goal")} onClick={function(){toggleSort("goal");}} style={{width:70}}>Goal</th>
                <th className={thClass("name")} onClick={function(){toggleSort("name");}}>Initiative</th>
                <th style={{width:85,cursor:"default"}}>Status</th>
                <th className={thClass("ci")} onClick={function(){toggleSort("ci");}} style={{width:90}}>Confidence</th>
                <th className={thClass("performers")} onClick={function(){toggleSort("performers");}} style={{width:80}}>Teams</th>
                <th className={thClass("committed")} onClick={function(){toggleSort("committed");}} style={{width:90}}>Staffing</th>
                <th style={{width:90,cursor:"default"}}>Capacity</th>
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?(
                <tr><td colSpan={8} style={{textAlign:"center",padding:"32px",color:"#aaa",fontStyle:"italic"}}>No initiatives match the current filters.</td></tr>
              ):filtered.map(function(x,idx){
                var g=GOALS[x.init.goal];
                var cs=ciStyle(x.cap?x.cap.ciNum:null);
                var sc=STATUS_CFG[x.init.status];
                return(
                  <tr key={x.init.id} onClick={function(){setDrill(x.init.id);}} style={{cursor:"pointer"}}>
                    {/* Goal color stripe */}
                    <td style={{padding:0,background:g?g.color:"#ccc",width:4}}></td>
                    {/* Goal chip */}
                    <td>
                      <span className="chip" style={{background:g?g.color+"22":"#eee",color:g?g.color:"#888"}}>G{g?g.num:"?"}</span>
                    </td>
                    {/* Initiative name + ID */}
                    <td style={{maxWidth:280}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:6,minWidth:0}}>
                        <span style={{fontSize:12.5,fontWeight:600,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:220}} title={x.init.name}>{x.init.name}</span>
                        <span style={{fontFamily:"monospace",fontSize:9.5,color:"#aaa",flexShrink:0}}>{x.init.id}</span>
                        {x.init.isNew&&<span className="chip" style={{background:"#FEF5E7",color:"#9A6800",flexShrink:0}}>NEW</span>}
                      </div>
                    </td>
                    {/* Status */}
                    <td>
                      {x.init.status&&sc?<span className="chip" style={{background:sc.bg,color:sc.tx}}>{x.init.status}</span>:<span style={{color:"#ccc",fontSize:10}}>—</span>}
                    </td>
                    {/* CI badge */}
                    <td>
                      {x.cap&&x.cap.ciNum!=null?(
                        <span className="ci-pill" style={{background:cs.bg,color:cs.tx}}>
                          <span style={{width:7,height:7,borderRadius:"50%",background:cs.dot,flexShrink:0}}/>
                          CI {x.cap.ciNum}
                        </span>
                      ):<span style={{color:"#ccc",fontSize:10,fontStyle:"italic"}}>awaiting</span>}
                    </td>
                    {/* Performer count */}
                    <td style={{color:"#555",fontSize:12}}>
                      {x.cap&&x.cap.performers?x.cap.performers+" teams":"—"}
                    </td>
                    {/* Staffing counts */}
                    <td><StaffCounts cap={x.cap}/></td>
                    {/* Mini bar */}
                    <td><MiniBar cap={x.cap}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {/* Legend */}
        <div style={{marginTop:10,display:"flex",alignItems:"center",gap:14,fontSize:10,color:"#888",flexWrap:"wrap"}}>
          <span style={{fontWeight:600,color:"#aaa",textTransform:"uppercase",fontSize:9,letterSpacing:.4}}>Capacity bar:</span>
          {[["#1E8449","Definitely"],["#58D68D","Possibly-S"],["#F9E79F","Possibly-M"],["#F0B27A","Possibly-L"],["#E74C3C","No Capacity"]].map(function(p){
            return <span key={p[1]} style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:12,height:6,background:p[0],borderRadius:1,display:"inline-block"}}/>{p[1]}</span>;
          })}
          <span style={{marginLeft:"auto",color:"#bbb",fontStyle:"italic"}}>Click any row for full capacity breakdown · Click column headers to sort</span>
        </div>
      </div>

      {drillItem&&<DrillPanel item={drillItem} onClose={function(){setDrill(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(EBC,null,React.createElement(App,null)));
</script>
</body>
</html>
