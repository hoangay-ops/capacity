<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>All of Us — Capacity Planning</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f8fa;color:#1a1a1a;overflow:hidden;}
button,select,input{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
@keyframes spin{to{transform:rotate(360deg)}}
.tbl{width:100%;border-collapse:collapse;font-size:12px;table-layout:fixed;}
.tbl th{background:#1e2a3a;color:#b8c8d8;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.55px;padding:7px 8px;white-space:nowrap;border-right:1px solid #2d3e52;cursor:pointer;user-select:none;overflow:hidden;text-overflow:ellipsis;}
.tbl th:hover{background:#263547;color:#fff;}
.tbl th.nosort{cursor:default;}
.tbl th:last-child{border-right:none;}
.tbl td{padding:5px 8px;border-bottom:1px solid #e4e8ed;border-right:1px solid #eff1f4;vertical-align:middle;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbl td:last-child{border-right:none;}
.tbl-body tr:hover td{background:#edf3fb !important;}
.tbl-body tr:nth-child(even) td{background:#f9fafb;}
.tbl-body tr:nth-child(odd) td{background:#fff;}
.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 6px;border-radius:8px;white-space:nowrap;}
.ci-pill{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:3px 8px;border-radius:10px;white-space:nowrap;}
.filter-btn{font-size:11.5px;padding:5px 11px;border:1px solid #dcdcdc;border-radius:18px;background:#fff;cursor:pointer;color:#555;transition:all .1s;line-height:1.4;font-weight:500;}
.filter-btn:hover{background:#EBF5FB;border-color:#2471A3;color:#2471A3;}
.filter-btn.active{background:#EBF5FB;border-color:#2471A3;color:#2471A3;font-weight:600;}
.metric-tile{background:#fff;border:1px solid #ececec;border-radius:10px;padding:10px 12px;cursor:default;min-width:0;}
.metric-tile.clickable{cursor:pointer;transition:transform .12s,box-shadow .12s;}
.metric-tile.clickable:hover{transform:translateY(-1px);box-shadow:0 3px 12px rgba(0,0,0,.06);}
.metric-tile.active{outline:2px solid rgba(36,113,163,.25);border-color:#9FC5E8;background:#F4FAFF;}
.metric-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;font-weight:700;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.metric-value{font-size:22px;font-weight:800;line-height:1.05;margin-top:3px;}
.metric-sub{font-size:9.5px;opacity:.68;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
</style>
</head>
<body>
<div id="root" style="height:100%;display:flex;flex-direction:column;"></div>
<script type="text/babel">

const LIVE_CSV     = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3uNKjiErriTzB7r258GdfQdeXVhzjbfG4VZr5J0u9ZMj9punGsNHbnzeaGyuiC3-VT1cUHAqrOSXI/pub?gid=0&single=true&output=csv";
const GOALS_CSV    = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3uNKjiErriTzB7r258GdfQdeXVhzjbfG4VZr5J0u9ZMj9punGsNHbnzeaGyuiC3-VT1cUHAqrOSXI/pub?gid=1157686184&single=true&output=csv";
const CAPACITY_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBMoz4Ih_0AkKsm0qr1xfM4tkppaQqFJVWJ8IE6tmSO99MmxUOW8scahb2ljMapz_lPO_4Q_EaKDR8/pub?gid=910516878&single=true&output=csv";

// Consolidated goal labels — consistent across all three dashboards
const GOALS = {
  "1":{num:"1",name:"Enrollment & Retention",short:"Enrollment & Retention",color:"#2471A3"},
  "2":{num:"2",name:"Data to Researchers",short:"Data to Researchers",color:"#1E8449"},
  "3":{num:"3",name:"Partnered Research",short:"Partnered Research",color:"#D35400"},
  "4":{num:"4",name:"Researcher Access",short:"Researcher Access",color:"#B7950B"},
  "5":{num:"5",name:"Return of Value",short:"Return of Value",color:"#7D3C98"},
  "6":{num:"6",name:"Management & Ops",short:"Management & Ops",color:"#5D6D7E"},
};

const STATUS_CFG = {
  Committed:{bg:"#D6EAF8",tx:"#1F618D"},
  Proposed:{bg:"#FCF3CF",tx:"#7D6608"},
  Backlogged:{bg:"#EAECEE",tx:"#566573"},
  Complete:{bg:"#D5F5E3",tx:"#1E8449"},
};

// Returns the chip styling + label for an initiative's status.
// Proposed splits into "Proposed (New)" (amber) vs "Proposed (Ongoing)" (yellow).
function statusDisplay(init){
  if(!init||!init.status)return null;
  var s=init.status;
  if(s==="Proposed"){
    if(init.isNew)return{label:"Proposed (New)",bg:"#FEF5E7",tx:"#9A6800"};
    return{label:"Proposed (Ongoing)",bg:"#FCF3CF",tx:"#7D6608"};
  }
  var cfg=STATUS_CFG[s];
  if(!cfg)return null;
  return{label:s,bg:cfg.bg,tx:cfg.tx};
}

// Team order MUST match the column order in the Calculations tab (5 cols per team, starting col N).
// OFM precedes TPC here — this matches the sheet. Swapping these two caused
// OFM entries to render under TPC's name and vice-versa (bug fix 2026-06).
// The startup verifier below cross-checks this array against the sheet's team-name header row.
const TEAMS = [
  "Chief of Staff","COO","DCD","DMSR","DMSR (ODA)","Engagement","OFM","TPC",
  "Innovation","Policy","Product","UX","DTPD","BioBank",
  "DRC: Analytics","DRC: Curation","DRC: RDR","DRC: HealthPro","DRC: Public","DRC: Workbench",
  "PPSC: NORC","PPSC: IBM","PPSC: Support Center"
];
const TEAM_COL_START = 13;

const LOE_LABEL = {"1":"XS","2":"S","3":"M","5":"L","8":"XL","13":"XXL","21":"XXXL"};
const STAFF_CFG = {
  "D":{label:"Definitely",color:"#1E8449",bg:"#eafaf1"},
  "P":{label:"Possibly",color:"#B7950B",bg:"#fefaec"},
  "N":{label:"No Capacity",color:"#C0392B",bg:"#fdf2f2"},
};

const CI_METHODOLOGY = "Confidence Index = weighted sum ÷ performers. Definitely +1.0, Possibly XS/S +0.8, Possibly M 0, Possibly L/XL −0.5, No Capacity −1.0. Thresholds: 8–10 on track, 6–7 monitor, ≤5 at risk.";

function ciTier(n){if(n==null)return"none";if(n>=8)return"high";if(n>=6)return"med";return"risk";}
function ciStyle(n){
  var t=ciTier(n);
  if(t==="high")return{bg:"#eafaf1",tx:"#1a6b3a",dot:"#1E8449"};
  if(t==="med") return{bg:"#fefaec",tx:"#7D6008",dot:"#F1C40F"};
  if(t==="risk")return{bg:"#fdf2f2",tx:"#922b21",dot:"#C0392B"};
  return{bg:"#f4f4f4",tx:"#888",dot:"#ccc"};
}

function cacheBust(u){return u+(u.includes("?")?"&":"?")+"_="+Date.now();}
function AoU(){ return <em style={{fontStyle:"italic"}}>All of Us</em>; }
function parseCSV(text){
  var rows=[],row=[],cell="",inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i],n=text[i+1];
    if(c==='"'&&inQ&&n==='"'){cell+='"';i++;}
    else if(c==='"')inQ=!inQ;
    else if(c===','&&!inQ){row.push(cell);cell="";}
    else if((c==='\n'||c==='\r')&&!inQ){if(cell||row.length){row.push(cell);rows.push(row);row=[];cell="";}if(c==='\r'&&n==='\n')i++;}
    else cell+=c;
  }
  if(cell||row.length){row.push(cell);rows.push(row);}
  return rows;
}
function nh(h){return String(h||"").toLowerCase().replace(/[\r\n]+/g," ").replace(/\s+/g," ").trim();}
function makeGet(hdr){
  var n=hdr.map(nh);
  return function(row){for(var k=1;k<arguments.length;k++){var idx=n.indexOf(nh(arguments[k]));if(idx!==-1&&row[idx]!=null&&String(row[idx]).trim()!=="")return String(row[idx]).trim();}return"";};
}
function findHdr(rows){for(var i=0;i<Math.min(6,rows.length);i++){var n=rows[i].map(nh);if(n.includes("id")&&(n.includes("initiative name")||n.includes("name")))return i;}return 0;}

function parseSt(r){
  if(!r)return null;
  var s=String(r);
  if(/concept/i.test(s)&&/committed/i.test(s))return"Concept";
  if(/proposed/i.test(s))return"Proposed";
  if(/committed/i.test(s))return"Committed";
  if(/backlog/i.test(s))return"Backlogged";
  if(/complete/i.test(s))return"Complete";
  if(/eliminat/i.test(s))return"Eliminated";
  return null;
}

function parseInits(t){
  var rows=parseCSV(t),hi=findHdr(rows),hdr=rows[hi],body=rows.slice(hi+1),get=makeGet(hdr);
  return body.reduce(function(acc,row){
    var id=get(row,"ID"),name=get(row,"Initiative Name","Name");
    if(!id||!name)return acc;
    var gm=String(get(row,"5 year Goal","Goal","5-year Goal")).match(/(\d)/);
    var g=gm?gm[1]:"";if(!GOALS[g])return acc;
    var q3s=get(row,"Q3 2026 Status","Q3 Status"),q2s=get(row,"Q2 2026 Status","Q2 Status");
    var status=parseSt(q3s)||parseSt(q2s);
    // Exclude Complete, Concept, Eliminated, and Backlogged — these don't move into Q3 capacity planning
    if(status==="Complete"||status==="Concept"||status==="Eliminated"||status==="Backlogged")return acc;
    acc.push({id,name,goal:g,status,
      isNew:/^new\b/i.test(get(row,"Project Type","Type")),
      objOwner:get(row,"Obj Owner","Objective Owner","Owner"),
      poc:get(row,"POC or PdM","POC","PdM"),
      objName:get(row,"Objective Name","Obj Name")});
    return acc;
  },[]);
}

function parseCap(t){
  var rows=parseCSV(t),hi=0;
  for(var i=0;i<Math.min(6,rows.length);i++){if(rows[i][0]&&nh(rows[i][0])==="id"){hi=i;break;}}

  // ── Belt-and-suspenders: verify team column order matches the TEAMS array ──
  // In the source sheet, team names typically appear as merged-cell headers spanning
  // 5 columns each, in a row above the per-column sub-headers. In CSV export the
  // merged value lands in the leftmost cell. We scan up to 3 rows above the ID-header
  // row at each expected team-column position; if a non-empty cell doesn't match the
  // TEAMS entry, we flag it. This catches future sheet edits that reorder columns.
  var mismatches=[];
  function findCellAbove(col,maxScan){
    var limit=Math.max(0,hi-(maxScan||3));
    for(var r=hi-1;r>=limit;r--){
      var cell=String((rows[r]||[])[col]||"").trim();
      if(cell)return cell;
    }
    return "";
  }
  TEAMS.forEach(function(expected,idx){
    var col=TEAM_COL_START+(idx*5);
    var found=findCellAbove(col,3);
    if(found&&found.toLowerCase()!==expected.toLowerCase()){
      // Tolerate trivial whitespace/punct differences but flag real ordering issues
      var norm=function(s){return s.toLowerCase().replace(/[^a-z0-9]/g,"");};
      if(norm(found)!==norm(expected)){
        mismatches.push("Position "+(idx+1)+" (col "+col+"): expected '"+expected+"', sheet shows '"+found+"'");
      }
    }
  });
  if(mismatches.length){
    console.error("⚠️ CAPACITY TEAM COLUMN MISMATCH — drill-down attribution will be incorrect until fixed:\n  - "+mismatches.join("\n  - "));
  }

  var get=makeGet(rows[hi]),body=rows.slice(hi+1),map={};
  body.forEach(function(row){
    var id=get(row,"ID");if(!id||!/^\d+\.\d+/.test(id))return;
    var cfr=get(row,"Confidence Factor");
    var cf=cfr.includes("%")?parseFloat(cfr)/100:parseFloat(cfr)||0;
    var lbl=String(row[2]||"").trim();
    var cm=lbl.match(/(\d+)/);
    function int(k){return parseInt(get(row,k))||0;}

    var performers=[];
    TEAMS.forEach(function(name,i){
      var base=TEAM_COL_START+(i*5);
      if(base>=row.length)return;
      var isPerformer=String(row[base]||"").trim()==="1";
      if(!isPerformer)return;
      var q3loe=String(row[base+1]||"").trim();
      var totalLoe=String(row[base+2]||"").trim();
      var staff=String(row[base+3]||"").trim();
      var notes=String(row[base+4]||"").trim();
      performers.push({name,q3loe,totalLoe,staff,notes});
    });

    map[id]={cf:isNaN(cf)?0:cf,lbl,ciNum:cm?parseInt(cm[1]):null,
      performers:int("Performers"),committed:int("Committed"),
      posXS:int("Possibly - XS"),posS:int("Possibly - S"),posM:int("Possibly - M"),
      posL:int("Possibly - L"),posXL:int("Possibly - XL"),
      noCapacity:int("No Capacity Remaining"),notPerforming:int("Not Performing"),
      teams:performers};
  });
  // Stash mismatches alongside the map so the App can surface them as a banner.
  // Underscore prefix makes it distinguishable from real initiative-ID keys.
  Object.defineProperty(map,"_mismatches",{value:mismatches,enumerable:false});
  return map;
}

function parseGoals(t){
  var rows=parseCSV(t),hi=0;
  for(var i=0;i<Math.min(5,rows.length);i++){var n=rows[i].map(nh);if(n.some(function(h){return h==="goal"||h==="goal #";})){hi=i;break;}}
  var get=makeGet(rows[hi]),body=rows.slice(hi+1),map={},lastG=null;
  body.forEach(function(row){
    var blank=row.every(function(c){return!c||!String(c).trim();});if(blank)return;
    var gm=String(get(row,"Goal","Goal #","5 year Goal")||"").match(/(\d)/);
    var gn=gm?gm[1]:lastG;if(!gn)return;lastG=gn;
    if(!map[gn])map[gn]={owner:get(row,"Goal Owner","Goal Owner Name")};
  });
  return map;
}

// Error boundary
function EBC(p){React.Component.call(this,p);this.state={err:null};}
EBC.prototype=Object.create(React.Component.prototype);
EBC.prototype.constructor=EBC;
EBC.prototype.componentDidCatch=function(e){this.setState({err:e});};
EBC.prototype.render=function(){
  if(this.state.err)return React.createElement("div",{style:{padding:40,color:"#C0392B",fontFamily:"monospace"}},String(this.state.err));
  return this.props.children;
};

const {useState,useMemo,useEffect} = React;

function MiniBar({cap}){
  if(!cap||!cap.performers)return <span style={{color:"#ccc",fontSize:10}}>awaiting</span>;
  var segs=[
    {n:cap.committed,c:"#1E8449"},
    {n:cap.posXS,c:"#82E0AA"},
    {n:cap.posS,c:"#58D68D"},
    {n:cap.posM,c:"#F9E79F"},
    {n:cap.posL,c:"#F0B27A"},
    {n:cap.posXL,c:"#E67E22"},
    {n:cap.noCapacity,c:"#E74C3C"}
  ];
  return(
    <div style={{display:"flex",height:7,borderRadius:2,overflow:"hidden",background:"#e8e8e8",width:90}}>
      {segs.map(function(s,i){return s.n>0?<div key={i} style={{flexGrow:s.n,background:s.c}}/>:null;})}
    </div>
  );
}

function StaffCounts({cap}){
  if(!cap||!cap.performers)return <span style={{color:"#bbb",fontSize:10}}>—</span>;
  var pos=cap.posXS+cap.posS+cap.posM+cap.posL+cap.posXL;
  return(
    <span title="✓ Definitely · ~ Possibly (any size) · ✗ No Capacity" style={{display:"inline-flex",gap:5,fontSize:11,fontWeight:600,letterSpacing:.2}}>
      {cap.committed>0&&<span style={{color:"#1E8449"}}>✓{cap.committed}</span>}
      {pos>0&&<span style={{color:"#B7950B"}}>~{pos}</span>}
      {cap.noCapacity>0&&<span style={{color:"#C0392B"}}>✗{cap.noCapacity}</span>}
    </span>
  );
}

function CapacityCell({cap}){
  if(!cap||!cap.performers)return <span style={{color:"#bbb",fontSize:10,fontStyle:"italic"}}>awaiting</span>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:0}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <span style={{color:"#555",fontSize:10.5,whiteSpace:"nowrap"}}>{cap.performers} team{cap.performers!==1?"s":""}</span>
        <StaffCounts cap={cap}/>
      </div>
      <MiniBar cap={cap}/>
    </div>
  );
}

function InsightCard({title,children,action}){
  return(
    <div style={{background:"#fff",border:"1px solid #ececec",borderRadius:10,boxShadow:"0 1px 2px rgba(0,0,0,.03)",overflow:"hidden"}}>
      <div style={{padding:"9px 12px",background:"#fafbfc",borderBottom:"1px solid #ececec",display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
        <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:.55,color:"#607080",fontWeight:800}}>{title}</div>
        {action&&<div style={{fontSize:10,color:"#8a98a8"}}>{action}</div>}
      </div>
      <div style={{padding:12}}>{children}</div>
    </div>
  );
}

function MiniRiskRow({item,onClick}){
  var g=GOALS[item.init.goal];
  var cs=ciStyle(item.cap?item.cap.ciNum:null);
  return(
    <div onClick={onClick} style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:8,alignItems:"center",padding:"7px 0",borderBottom:"1px solid #eef1f4",cursor:"pointer"}}>
      <span className="chip" style={{background:g?g.color+"22":"#eee",color:g?g.color:"#888"}}>G{g?g.num:"?"}</span>
      <div style={{minWidth:0}}>
        <div style={{fontSize:11.5,fontWeight:650,color:"#222",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.init.name}</div>
        <div style={{fontSize:9.5,color:"#9aa3ad",fontFamily:"monospace",marginTop:1}}>{item.init.id} · {item.cap&&item.cap.performers?item.cap.performers+" teams":"awaiting"}</div>
      </div>
      <span className="ci-pill" style={{background:cs.bg,color:cs.tx,padding:"3px 7px"}}>CI {item.cap&&item.cap.ciNum!=null?item.cap.ciNum:"—"}</span>
    </div>
  );
}

function GoalHealthRows({goalHealth,onGoalClick}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:7}}>
      {Object.keys(GOALS).map(function(k){
        var g=GOALS[k],h=goalHealth[k]||{high:0,med:0,risk:0,noData:0,total:0};
        var total=h.total||1;
        var segs=[{n:h.high,c:"#58D68D"},{n:h.med,c:"#F9CA24"},{n:h.risk,c:"#E74C3C"},{n:h.noData,c:"#9AA3AD"}];
        return(
          <div key={k} onClick={function(){onGoalClick(k);}} style={{cursor:"pointer"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:8,marginBottom:3}}>
              <div style={{fontSize:11,fontWeight:700,color:g.color,whiteSpace:"nowrap"}}>G{k} {g.short}</div>
              <div style={{fontSize:10,color:"#8a98a8",whiteSpace:"nowrap"}}>{h.high} on · {h.med} mon · {h.risk} risk</div>
            </div>
            <div style={{height:7,borderRadius:4,overflow:"hidden",background:"#eef1f4",display:"flex"}}>
              {segs.map(function(s,i){return s.n>0?<div key={i} style={{width:(s.n/total*100)+"%",background:s.c}}/>:null;})}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function BottleneckRows({teams}){
  if(!teams.length)return <div style={{fontSize:12,color:"#aaa",fontStyle:"italic",textAlign:"center",padding:"10px 0"}}>No capacity bottlenecks found.</div>;
  return(
    <div style={{display:"flex",flexDirection:"column",gap:6}}>
      {teams.map(function(t){
        var frac=t.total>0?(t.count/t.total*100):0;
        return(
          <div key={t.name} style={{display:"grid",gridTemplateColumns:"1fr auto",gap:8,alignItems:"center"}}>
            <div style={{minWidth:0}}>
              <div style={{fontSize:11.5,fontWeight:650,color:"#333",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{t.name}</div>
              <div style={{height:5,borderRadius:3,background:"#f0f2f5",overflow:"hidden",marginTop:3}}>
                <div style={{height:"100%",width:Math.min(100,frac)+"%",background:"#E74C3C"}}/>
              </div>
            </div>
            <div title={t.count+" of "+t.total+" assigned initiatives this cycle"} style={{fontSize:11,fontWeight:800,color:"#C0392B",whiteSpace:"nowrap"}}>{t.count} / {t.total}</div>
          </div>
        );
      })}
    </div>
  );
}

function InsightPanel({insights,health,onSelect,onGoalClick,onTierClick}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:10,minWidth:0}}>
      <InsightCard title="Attention Needed" action={insights.topRisks.length+" priority items"}>
        {insights.topRisks.length?insights.topRisks.map(function(x){return <MiniRiskRow key={x.init.id} item={x} onClick={function(){onSelect(x.init.id);}}/>;}):
          <div style={{fontSize:12,color:"#aaa",fontStyle:"italic",textAlign:"center",padding:"10px 0"}}>No at-risk initiatives in this view.</div>}
      </InsightCard>

      <InsightCard title="Quick Readout">
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:10}}>
          {[
            ["At Risk",health.risk,"#E74C3C","risk"],
            ["Monitor",health.med,"#B7950B","med"],
            ["No Data",health.noData,"#7a9ab8","none"],
            ["Avg CI",health.avg!=null?health.avg:"—",health.avg>=8?"#1E8449":health.avg>=6?"#B7950B":"#C0392B",null]
          ].map(function(k){return(
            <div key={k[0]} title={k[0]==="Avg CI"?CI_METHODOLOGY:undefined} onClick={function(){if(k[3])onTierClick(k[3]);}} style={{background:k[2]+"12",border:"1px solid "+k[2]+"22",borderRadius:7,padding:"8px 9px",cursor:k[3]?"pointer":"default"}}>
              <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.45,color:k[2],fontWeight:800}}>{k[0]}</div>

            </div>
          );})}
        </div>
        <div style={{fontSize:11.5,color:"#67717c",lineHeight:1.45,background:"#fafbfc",borderRadius:7,padding:9}}>
          {insights.readout}
        </div>
      </InsightCard>

      <InsightCard title="Goal Health" action="click a goal to filter">
        <GoalHealthRows goalHealth={insights.goalHealth} onGoalClick={onGoalClick}/>
      </InsightCard>

      <InsightCard title="Capacity Bottlenecks" action="no-capacity / assigned">
        <BottleneckRows teams={insights.bottlenecks}/>
      </InsightCard>

      <InsightCard title="Legend">
        <div style={{display:"flex",flexWrap:"wrap",gap:"6px 10px",fontSize:10.5,color:"#777"}}>
          {[
            ["#1E8449","Definitely (+1.0)"],
            ["#82E0AA","Possibly — XS (+0.8)"],
            ["#58D68D","Possibly — S (+0.8)"],
            ["#F9E79F","Possibly — M (0)"],
            ["#F0B27A","Possibly — L (−0.5)"],
            ["#E67E22","Possibly — XL (−0.5)"],
            ["#E74C3C","No Capacity (−1.0)"]
          ].map(function(p){
            return <span key={p[1]} style={{display:"inline-flex",alignItems:"center",gap:4}}><span style={{width:13,height:6,background:p[0],borderRadius:2,display:"inline-block"}}/>{p[1]}</span>;
          })}
        </div>
        <div style={{borderTop:"1px solid #eee",paddingTop:8,marginTop:8,fontSize:10.5,color:"#777",display:"flex",gap:14,flexWrap:"wrap"}}>
          <span><span style={{color:"#1E8449",fontWeight:700}}>✓</span> Definitely</span>
          <span><span style={{color:"#B7950B",fontWeight:700}}>~</span> Possibly (any size)</span>
          <span><span style={{color:"#C0392B",fontWeight:700}}>✗</span> No Capacity</span>
        </div>
        <div style={{borderTop:"1px solid #eee",paddingTop:8,marginTop:8,fontSize:10.5,color:"#777",display:"flex",gap:14,flexWrap:"wrap"}}>
          <span><span className="chip" style={{background:"#FCF3CF",color:"#7D6608",fontSize:9.5}}>Proposed (Ongoing)</span> carried forward</span>
          <span><span className="chip" style={{background:"#FEF5E7",color:"#9A6800",fontSize:9.5}}>Proposed (New)</span> first time this cycle</span>
        </div>
        <div style={{fontSize:10,color:"#aaa",marginTop:9,fontStyle:"italic"}}>Click any initiative row for performer detail. Click table headers to sort.</div>
      </InsightCard>
    </div>
  );
}

// Drill panel

  var cs=ciStyle(cap?cap.ciNum:null);
  var sd=statusDisplay(init);

    cap.teams.forEach(function(t){

  return(
    <div style={{position:"fixed",inset:0,zIndex:900,display:"flex",justifyContent:"flex-end"}}>

      <div style={{width:440,maxWidth:"42vw",background:"#fff",borderLeft:"1px solid #ececec",boxShadow:"-4px 0 16px rgba(0,0,0,.08)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

        <div style={{background:"#1e2a3a",padding:"14px 18px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:10,color:"#7a9ab8",fontFamily:"monospace",marginBottom:4}}>
                {init.id} {g?"· G"+g.num+" "+g.name:""}

              <div style={{fontSize:14,fontWeight:700,color:"#fff",lineHeight:1.3}}>{init.name}</div>
            </div>
            <button onClick={onClose} style={{border:"none",background:"none",color:"#7a9ab8",fontSize:20,cursor:"pointer",lineHeight:1,padding:0}}>×</button>
          </div>
          <div style={{display:"flex",gap:4,marginTop:10,flexWrap:"wrap"}}>
            {sd&&<span className="chip" style={{background:sd.bg,color:sd.tx}}>{sd.label}</span>}
            {init.isNew&&init.status!=="Proposed"&&<span className="chip" style={{background:"#FEF5E7",color:"#9A6800"}}>NEW</span>}
          </div>
        </div>

        <div style={{flex:1,overflowY:"auto"}}>

          <div title={CI_METHODOLOGY} style={{padding:"14px 18px",borderBottom:"1px solid #eeeff2",background:cs.bg}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div>
                <div style={{fontSize:9,textTransform:"uppercase",letterSpacing:.5,color:cs.tx,fontWeight:700,opacity:.7,marginBottom:3}}>{cap?cap.lbl:"Confidence Index"}</div>
                <div style={{fontSize:34,fontWeight:800,color:cs.tx,lineHeight:1}}>{cap&&cap.ciNum!=null?cap.ciNum:"—"}<span style={{fontSize:15,fontWeight:400,opacity:.4}}>/10</span></div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:26,fontWeight:700,color:cs.tx}}>{cap?Math.round(cap.cf*100):0}%</div>
                <div style={{fontSize:10,color:cs.tx,opacity:.7}}>{cap?cap.performers:0} performer{cap&&cap.performers!==1?"s":""}</div>
              </div>
            </div>
            <div style={{height:7,borderRadius:3,background:cs.tx+"28",overflow:"hidden"}}>
              <div style={{height:"100%",width:(cap?Math.round(cap.cf*100):0)+"%",background:cs.dot,borderRadius:3,transition:"width .4s"}}/>
            </div>
          </div>

          <div style={{padding:"14px 18px",borderBottom:"1px solid #eeeff2"}}>
            <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#888",fontWeight:700,marginBottom:10}}>
              Performers {cap&&cap.teams&&cap.teams.length>0?"("+cap.teams.length+" teams)":""}

            {cap&&cap.teams&&cap.teams.length>0?(

                {["D","P","N"].map(function(staffKey){

                      {group.map(function(t,i){
                        var loeLbl=LOE_LABEL[t.q3loe]||t.q3loe||"—";
                        var totLbl=LOE_LABEL[t.totalLoe]||t.totalLoe||"—";
                        return(
                          <div key={i} style={{display:"grid",gridTemplateColumns:"1fr auto auto",gap:"0 10px",padding:"5px 10px",marginBottom:2,borderRadius:5,background:scfg.bg,borderLeft:"3px solid "+scfg.color+"55",fontSize:11.5}}>
                            <span style={{color:"#222",fontWeight:500,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span>
                            <span style={{color:"#888",whiteSpace:"nowrap",fontSize:10.5}}>Q3: <strong style={{color:"#444"}}>{loeLbl}</strong></span>
                            <span style={{color:"#888",whiteSpace:"nowrap",fontSize:10.5}}>3Qtr: <strong style={{color:"#444"}}>{totLbl}</strong></span>
                            {t.notes&&<div style={{gridColumn:"1/-1",fontSize:10,color:"#888",marginTop:3,fontStyle:"italic",whiteSpace:"normal"}}>{t.notes}</div>}

              <div style={{padding:"20px 0",textAlign:"center",color:"#bbb",fontSize:12,fontStyle:"italic"}}>
                No performer submissions yet.
              </div>
            )}

          <div style={{padding:"12px 18px",borderBottom:"1px solid #eeeff2"}}>
            <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#888",fontWeight:700,marginBottom:8}}>Confidence weighting</div>
            <div style={{display:"grid",gridTemplateColumns:"auto 1fr auto",gap:"5px 10px",fontSize:11}}>
              {[["✓","Definitely","+1.0","#1E8449"],["~","Possibly — XS / S","+0.8","#27AE60"],["~","Possibly — M","0","#B7950B"],["~","Possibly — L / XL","−0.5","#E67E22"],["✗","No Capacity","−1.0","#C0392B"]].map(function(r,i){
                return[
                  <span key={i+"i"} style={{color:r[3],fontWeight:700}}>{r[0]}</span>,
                  <span key={i+"l"} style={{color:"#555"}}>{r[1]}</span>,
                  <span key={i+"w"} style={{color:r[3],fontWeight:600,textAlign:"right"}}>{r[2]}</span>
                ];
              })}
            </div>
          </div>

          {(init.objOwner||init.poc||init.objName)&&(
            <div style={{padding:"12px 18px"}}>
              <div style={{fontSize:9.5,textTransform:"uppercase",letterSpacing:.5,color:"#888",fontWeight:700,marginBottom:8}}>People</div>
              <div style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:"5px 10px",fontSize:11.5}}>
                {init.objOwner&&<><span style={{color:"#aaa"}}>Obj. Owner</span><span style={{color:"#333"}}>{init.objOwner}</span></>}
                {init.poc&&<><span style={{color:"#aaa"}}>POC / PdM</span><span style={{color:"#333"}}>{init.poc}</span></>}
                {init.objName&&<><span style={{color:"#aaa"}}>Objective</span><span style={{color:"#333",fontSize:11}}>{init.objName}</span></>}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// Wider Status / Confidence / Capacity columns — Initiative column flexes to fill remaining space.
// Status widened to fit "Proposed (Ongoing)" comfortably.
const COLS = [
  {w:4,    th:"",           key:"stripe",    nosort:true},
  {w:54,   th:"Goal",       key:"goal"},
  {w:null, th:"Initiative", key:"name"},
  {w:130,  th:"Status",     key:"status",    nosort:true},
  {w:105,  th:"Confidence", key:"ci",        tip:CI_METHODOLOGY},
  {w:185,  th:"Capacity",   key:"committed"},
];

function ColGroup(){
  return(
    <colgroup>
      {COLS.map(function(c,i){return <col key={i} style={{width:c.w?c.w+"px":"auto"}}/>;} )}

function MismatchBanner({mismatches,onDismiss}){
  if(!mismatches||!mismatches.length)return null;
  return(
    <div style={{padding:"10px 24px",background:"#FDECEA",borderBottom:"1px solid #E6B0AA",color:"#7B241C",fontSize:12,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
        <span style={{fontSize:16,lineHeight:1.2}}>⚠️</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,marginBottom:4}}>Capacity team column mismatch detected ({mismatches.length})</div>
          <div style={{fontSize:11,lineHeight:1.5}}>
            The Calculations tab columns don't match the expected TEAMS order. Drill-down performer attribution may be incorrect until the dashboard code or the sheet column order is fixed.
            <ul style={{margin:"6px 0 0 18px",padding:0,fontSize:10.5,fontFamily:"monospace",color:"#922b21"}}>
              {mismatches.map(function(m,i){return <li key={i} style={{marginBottom:2}}>{m}</li>;})}
            </ul>
          </div>
        </div>
        <button onClick={onDismiss} title="Dismiss" style={{border:"none",background:"none",color:"#7B241C",fontSize:18,cursor:"pointer",lineHeight:1,padding:"0 4px",flexShrink:0}}>×</button>
      </div>
    </div>
  );
}

function App(){
  var ist=useState([]);   var inits=ist[0],setInits=ist[1];
  var cst=useState({});   var capMap=cst[0],setCapMap=cst[1];
  var gst=useState({});   var goalsRef=gst[0],setGoalsRef=gst[1];
  var mst=useState([]);   var mismatches=mst[0],setMismatches=mst[1];
  var bdm=useState(false); var bannerDismissed=bdm[0],setBannerDismissed=bdm[1];
  var lst=useState("loading"); var loadState=lst[0],setLoadState=lst[1];
  var ler=useState(""); var loadError=ler[0],setLoadError=ler[1];
  var lat=useState(null); var loadedAt=lat[0],setLoadedAt=lat[1];
  var drl=useState(null); var drill=drl[0],setDrill=drl[1];
  var gfl=useState("all"); var goalFilter=gfl[0],setGoalFilter=gfl[1];
  var tfl=useState("all"); var tierFilter=tfl[0],setTierFilter=tfl[1];
  var sfl=useState(""); var search=sfl[0],setSearch=sfl[1];
  var srt=useState({col:"ci",dir:"asc"}); var sortState=srt[0],setSortState=srt[1];

  function loadAll(){
    setLoadState("loading");setLoadError("");setBannerDismissed(false);
    var p1=fetch(cacheBust(LIVE_CSV),{cache:"no-store"}).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.text();}).then(parseInits);
    var p2=fetch(cacheBust(CAPACITY_CSV),{cache:"no-store"}).then(function(r){return r.text();}).then(parseCap).catch(function(){return{};});
    var p3=fetch(cacheBust(GOALS_CSV),{cache:"no-store"}).then(function(r){return r.text();}).then(parseGoals).catch(function(){return{};});
    Promise.all([p1,p2,p3]).then(function(r){
      var capData=r[1]||{};
      var mm=capData._mismatches||[];
      setInits(r[0]);setCapMap(capData);setMismatches(mm);setGoalsRef(r[2]);
      setLoadState("live");setLoadedAt(new Date());
    })
      .catch(function(e){setLoadError(e.message||String(e));setLoadState("error");});
  }
  useEffect(function(){loadAll();},[]);

  var items=useMemo(function(){return inits.map(function(i){return{init:i,cap:capMap[i.id]||null};});},[inits,capMap]);

  var health=useMemo(function(){
    var h=0,m=0,r=0,nd=0,sum=0,cnt=0;
    items.forEach(function(x){var n=x.cap?x.cap.ciNum:null;if(n==null){nd++;return;}cnt++;sum+=n;if(n>=8)h++;else if(n>=6)m++;else r++;});
    return{high:h,med:m,risk:r,noData:nd,avg:cnt?Math.round(sum/cnt*10)/10:null,total:items.length};
  },[items]);

  var insights=useMemo(function(){
    var goalHealth={},teamCounts={},teamTotals={},awaiting=[];
    Object.keys(GOALS).forEach(function(k){goalHealth[k]={high:0,med:0,risk:0,noData:0,total:0};});
    items.forEach(function(x){
      var gh=goalHealth[x.init.goal];
      if(gh){
        gh.total++;
        var tier=ciTier(x.cap?x.cap.ciNum:null);
        if(tier==="high")gh.high++;else if(tier==="med")gh.med++;else if(tier==="risk")gh.risk++;else gh.noData++;
      }
      if(!x.cap||x.cap.ciNum==null)awaiting.push(x);
      if(x.cap&&x.cap.teams){
        x.cap.teams.forEach(function(t){
          teamTotals[t.name]=(teamTotals[t.name]||0)+1;
          if(t.staff==="N")teamCounts[t.name]=(teamCounts[t.name]||0)+1;
        });
      }
    });
    var topRisks=items.filter(function(x){return x.cap&&x.cap.ciNum!=null&&x.cap.ciNum<=5;})
      .sort(function(a,b){
        var ac=a.cap?a.cap.ciNum:99,bc=b.cap?b.cap.ciNum:99;
        if(ac!==bc)return ac-bc;
        return (b.cap?b.cap.noCapacity:0)-(a.cap?a.cap.noCapacity:0);
      }).slice(0,5);
    var bottlenecks=Object.keys(teamCounts).map(function(name){return{name:name,count:teamCounts[name],total:teamTotals[name]||0};})
      .sort(function(a,b){return b.count-a.count||a.name.localeCompare(b.name);}).slice(0,7);
    var riskiestGoal=Object.keys(goalHealth).sort(function(a,b){return goalHealth[b].risk-goalHealth[a].risk;})[0];
    var readout=health.risk>0
      ? "Highest attention is needed for "+health.risk+" at-risk initiative"+(health.risk===1?"":"s")+". "+(riskiestGoal&&goalHealth[riskiestGoal].risk>0?"Risk is most concentrated in G"+riskiestGoal+" ("+GOALS[riskiestGoal].short+"). ":"")+(health.noData>0?health.noData+" initiative"+(health.noData===1?" is":"s are")+" still awaiting capacity data.":"All initiatives have capacity data.")
      : "No initiatives are currently in the at-risk tier. "+(health.med>0?health.med+" initiative"+(health.med===1?" is":"s are")+" in monitor status. ":"")+(health.noData>0?health.noData+" initiative"+(health.noData===1?" is":"s are")+" awaiting capacity data.":"All initiatives have capacity data.");
    return{goalHealth:goalHealth,topRisks:topRisks,bottlenecks:bottlenecks,awaiting:awaiting,readout:readout};
  },[items,health]);

  function compareIds(a,b){var ap=String(a).split(".").map(Number),bp=String(b).split(".").map(Number);for(var i=0;i<Math.max(ap.length,bp.length);i++){var av=ap[i]||0,bv=bp[i]||0;if(av!==bv)return av-bv;}return 0;}

  var filtered=useMemo(function(){
    var out=items.filter(function(x){
      if(goalFilter!=="all"&&x.init.goal!==goalFilter)return false;
      if(tierFilter!=="all"){var t=ciTier(x.cap?x.cap.ciNum:null);if(t!==tierFilter)return false;}
      if(search){var q=search.toLowerCase();if(!x.init.name.toLowerCase().includes(q)&&!x.init.id.includes(q))return false;}
      return true;
    });
    var col=sortState.col,asc=sortState.dir==="asc";
    out.sort(function(a,b){
      var av,bv;
      if(col==="ci"){av=a.cap?a.cap.ciNum??-1:-1;bv=b.cap?b.cap.ciNum??-1:-1;return asc?av-bv:bv-av;}
      if(col==="id"||col==="name"){var c=asc?compareIds(a.init.id,b.init.id):compareIds(b.init.id,a.init.id);return c;}
      if(col==="goal"){return asc?a.init.goal.localeCompare(b.init.goal):b.init.goal.localeCompare(a.init.goal);}
      if(col==="performers"){av=a.cap?a.cap.performers:0;bv=b.cap?b.cap.performers:0;return asc?av-bv:bv-av;}
      if(col==="committed"){av=a.cap?a.cap.committed:0;bv=b.cap?b.cap.committed:0;return asc?av-bv:bv-av;}
      return 0;
    });
    return out;
  },[items,goalFilter,tierFilter,search,sortState]);

  function toggleSort(col){setSortState(function(p){return{col,dir:p.col===col&&p.dir==="asc"?"desc":"asc"};});}

  var drillItem=drill?items.find(function(x){return x.init.id===drill;}):null;

  if(loadState==="loading")return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#999"}}>
      <div style={{width:32,height:32,border:"3px solid #eee",borderTopColor:"#2471A3",borderRadius:"50%",animation:"spin .8s linear infinite"}}/>
      <div style={{fontSize:13}}>Loading capacity data…</div>
    </div>
  );
  if(loadState==="error")return(
    <div style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,color:"#555",padding:40}}>
      <div>⚠️ {loadError}</div>
      <button onClick={loadAll} style={{padding:"8px 20px",border:"1px solid #2471A3",color:"#2471A3",background:"#fff",borderRadius:6,cursor:"pointer"}}>Retry</button>
    </div>
  );

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:"#f7f8fa"}}>

      {/* Standard header — matches QPE and Roadmap */}
      <div style={{padding:"14px 24px",background:"#fff",borderBottom:"1px solid #ececec",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,gap:12}}>
        <div style={{minWidth:0}}>
          <div style={{fontSize:10.5,textTransform:"uppercase",letterSpacing:1.4,color:"#888",fontWeight:600,marginBottom:4}}>NIH · <em>All of Us</em> Research Program · Q3 2026 Capacity Planning</div>
          <div style={{fontSize:20,fontWeight:700,color:"#111",lineHeight:1.2,letterSpacing:-0.2}}>Capacity Planning Dashboard</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0,flexWrap:"wrap"}}>
          {loadState==="live"&&<span style={{fontSize:11,padding:"3px 10px",borderRadius:20,background:"#EAF7EF",color:"#1E8449",fontWeight:600}}>● live · {loadedAt.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit"})}</span>}
          <button onClick={loadAll} title="Refresh data" style={{fontSize:11.5,padding:"6px 12px",border:"1px solid #C8DCF0",borderRadius:6,background:"#EBF5FB",color:"#2471A3",cursor:"pointer",fontWeight:500}}>↻ Refresh</button>
        </div>
      </div>

      {/* Startup verification banner — only shows if team column order in the sheet
          doesn't match the TEAMS array in this dashboard's code */}
      {!bannerDismissed && <MismatchBanner mismatches={mismatches} onDismiss={function(){setBannerDismissed(true);}}/>}

      {/* Metric strip */}
      <div style={{padding:"12px 24px 8px",background:"#fff",borderBottom:"1px solid #ececec",flexShrink:0}}>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(118px,1fr))",gap:10}}>
          {[
            {label:"Total",val:health.total,sub:"initiatives",col:"#4b6378",k:"all",noFilter:true},
            {label:"🟢 On Track",val:health.high,sub:"CI 8–10",col:"#1E8449",k:"high"},
            {label:"🟡 Monitor",val:health.med,sub:"CI 6–7",col:"#B7950B",k:"med"},
            {label:"🔴 At Risk",val:health.risk,sub:"CI ≤ 5",col:"#C0392B",k:"risk"},
            {label:"⚪ No Data",val:health.noData,sub:"awaiting",col:"#7a8b9a",k:"none"},
          ].map(function(t){
            var active=tierFilter===t.k&&!t.noFilter;
            return(
              <div key={t.label} className={"metric-tile "+(!t.noFilter?"clickable ":"")+(active?"active":"")} onClick={function(){if(!t.noFilter)setTierFilter(tierFilter===t.k?"all":t.k);}}>
                <div className="metric-label" style={{color:t.col}}>{t.label}</div>
                <div className="metric-value" style={{color:t.col}}>{t.val}</div>
                <div className="metric-sub" style={{color:t.col}}>{t.sub}</div>
              </div>
            );
          })}
          {health.avg!=null&&(
            <div className="metric-tile" title={CI_METHODOLOGY}>
              <div className="metric-label" style={{color:"#607080"}}>Avg CI</div>
              <div className="metric-value" style={{color:health.avg>=8?"#1E8449":health.avg>=6?"#B7950B":"#C0392B"}}>{health.avg}</div>
              <div className="metric-sub" style={{color:"#607080"}}>program avg</div>
            </div>
          )}
        </div>
      </div>

      {/* Filter toolbar — matches QPE/Roadmap style */}
      <div style={{padding:"10px 24px",background:"#fafafa",borderBottom:"1px solid #ececec",display:"flex",gap:8,alignItems:"center",flexWrap:"wrap",flexShrink:0}}>
        <span style={{fontSize:10,textTransform:"uppercase",color:"#aaa",fontWeight:700,letterSpacing:.05,marginRight:2}}>Filter</span>
        {[{k:"all",l:"All"},{k:"risk",l:"🔴 At Risk"},{k:"med",l:"🟡 Monitor"},{k:"high",l:"🟢 On Track"},{k:"none",l:"⚪ Awaiting"}].map(function(f){
          return <button key={f.k} className={"filter-btn"+(tierFilter===f.k?" active":"")} onClick={function(){setTierFilter(f.k);}}>{f.l}</button>;
        })}
        <select value={goalFilter} onChange={function(e){setGoalFilter(e.target.value);}} style={{fontSize:11.5,padding:"5px 10px",border:"1px solid "+(goalFilter !== "all" ? "#2471A3" : "#dcdcdc"),borderRadius:18,background:goalFilter !== "all" ? "#EBF5FB" : "#fff",color:goalFilter !== "all" ? "#2471A3" : "#555",fontWeight:goalFilter !== "all" ? 600 : 400}}>
          <option value="all">All Goals</option>
          {Object.keys(GOALS).map(function(k){return<option key={k} value={k}>G{GOALS[k].num}: {GOALS[k].short}</option>;})}
        </select>
        {(search||goalFilter!=="all"||tierFilter!=="all")&&
          <button onClick={function(){setSearch("");setGoalFilter("all");setTierFilter("all");}}
            style={{fontSize:11.5,background:"none",border:"none",color:"#C0392B",cursor:"pointer",fontWeight:600}}>✕ Clear</button>}
        <div style={{flex:1}}/>
        <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="🔍  Search…" style={{fontSize:12,padding:"5px 11px",border:"1px solid #dcdcdc",borderRadius:18,width:200}}/>
        <span style={{fontSize:11,padding:"3px 9px",borderRadius:20,background:"#fff",border:"1px solid #ececec",color:"#888"}}><strong style={{color:"#333"}}>{filtered.length}</strong> of {health.total}</span>
      </div>

      {/* Two-column workspace */}
      <div style={{flex:1,display:"grid",gridTemplateColumns:"minmax(0,2fr) 372px",gap:12,padding:"14px 24px",overflow:"hidden",background:"#f7f8fa"}}>
        <div style={{minWidth:0,overflow:"auto",border:"1px solid #ececec",background:"#fff",borderRadius:10,boxShadow:"0 1px 2px rgba(0,0,0,.03)"}}>
          <table className="tbl tbl-body" style={{tableLayout:"fixed",width:"100%"}}>
            <ColGroup/>
            <thead>
              <tr>
                {COLS.map(function(c,i){
                  var isActive=sortState.col===c.key;
                  return(
                    <th key={i} className={c.nosort?"nosort":""} title={c.tip}
                      style={{position:"sticky",top:0,zIndex:2,padding:c.key==="stripe"?"0":"6px 8px",cursor:c.nosort?"default":"pointer",fontSize:9.5}}
                      onClick={c.nosort?undefined:function(){toggleSort(c.key);}}>
                      {c.th}{!c.nosort&&isActive&&<span style={{opacity:.7}}>{sortState.dir==="asc"?" ↑":" ↓"}</span>}
                    </th>
                  );
                })}
              </tr>
            </thead>
            <tbody>
              {filtered.length===0?(
                <tr><td colSpan={COLS.length} style={{textAlign:"center",padding:"40px",color:"#aaa",fontStyle:"italic",borderRight:"none"}}>No initiatives match the current filters.</td></tr>
              ):filtered.map(function(x){
                var g=GOALS[x.init.goal];
                var cs=ciStyle(x.cap?x.cap.ciNum:null);
                var sd=statusDisplay(x.init);
                return(
                  <tr key={x.init.id} onClick={function(){setDrill(x.init.id);}} style={{cursor:"pointer"}}>
                    <td style={{padding:0,background:g?g.color:"#ccc"}}/>
                    <td><span className="chip" style={{background:g?g.color+"22":"#eee",color:g?g.color:"#888"}}>G{g?g.num:"?"}</span></td>
                    <td title={x.init.name} style={{maxWidth:0}}>
                      <div style={{display:"flex",flexDirection:"column",gap:2,minWidth:0}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,overflow:"hidden"}}>
                          <span style={{fontSize:12.5,fontWeight:700,color:"#1a1a1a",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",flex:"1 1 0",minWidth:0}}>{x.init.name}</span>
                        </div>
                        <div style={{fontFamily:"monospace",fontSize:9.5,color:"#aaa",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{x.init.id}{x.init.objOwner?" · "+x.init.objOwner:""}</div>
                      </div>
                    </td>
                    <td>{sd?<span className="chip" style={{background:sd.bg,color:sd.tx}}>{sd.label}</span>:<span style={{color:"#ccc",fontSize:10}}>—</span>}</td>
                    <td>
                      {x.cap&&x.cap.ciNum!=null?(
                        <span className="ci-pill" title={CI_METHODOLOGY} style={{background:cs.bg,color:cs.tx}}>
                          <span style={{width:7,height:7,borderRadius:"50%",background:cs.dot,flexShrink:0}}/>CI {x.cap.ciNum}
                        </span>
                      ):<span style={{color:"#ccc",fontSize:10,fontStyle:"italic"}}>awaiting</span>}
                    </td>
                    <td><CapacityCell cap={x.cap}/></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        <div style={{minWidth:0,overflow:"auto"}}>
          <InsightPanel insights={insights} health={health}
            onSelect={function(id){setDrill(id);}}
            onGoalClick={function(g){setGoalFilter(goalFilter===g?"all":g);}}
            onTierClick={function(t){setTierFilter(tierFilter===t?"all":t);}}/>
        </div>
      </div>

      {drillItem&&<DrillPanel item={drillItem} onClose={function(){setDrill(null);}}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(EBC,null,React.createElement(App,null)));
</script>
</body>
</html>
